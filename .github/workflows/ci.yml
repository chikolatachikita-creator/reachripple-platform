name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  MONGO_URI: mongodb://127.0.0.1:27017/reachripple-test

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports: [27017:27017]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint (TypeScript compile check)
        working-directory: backend
        run: npx tsc --noEmit --skipLibCheck

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          MONGO_URI: ${{ env.MONGO_URI }}
          JWT_SECRET: ci-test-secret-key-not-for-production
          JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-production
          ACCESS_TOKEN_SECRET: ci-test-access-secret-not-for-production
          REFRESH_TOKEN_SECRET: ci-test-refresh-secret-not-for-production
        run: npx jest --forceExit --detectOpenHandles --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ── Frontend Tests ─────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        env:
          CI: true
        run: npx react-scripts test --watchAll=false --ci --coverage

      - name: Build (verify production build works)
        working-directory: frontend
        env:
          CI: true
          REACT_APP_API_BASE_URL: /api
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ── Docker Build Check ─────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        working-directory: backend
        run: docker build -t reachripple-backend:ci .

      - name: Build frontend image
        working-directory: frontend
        run: |
          npm ci
          CI=true REACT_APP_API_BASE_URL=/api npm run build
          docker build -t reachripple-frontend:ci .
