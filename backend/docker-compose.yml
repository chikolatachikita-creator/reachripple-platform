# Docker Compose configuration for ReachRipple Platform
# MongoDB, Redis, Backend API, Frontend Nginx

services:
  # MongoDB - Primary database
  mongo:
    image: mongo:7.0
    container_name: reachripple-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-reachripple}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme_in_production}
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reachripple-network

  # Redis - Caching & session storage
  redis:
    image: redis:7.2-alpine
    container_name: reachripple-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reachripple-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reachripple-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-reachripple}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme_in_production}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-reachripple}:${MONGO_ROOT_PASSWORD:-changeme_in_production}@mongo:27017/reachripple?authSource=admin
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis123}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      JWT_EXPIRE: ${JWT_EXPIRE:-24h}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reachripple-network

  # Frontend - React with Nginx
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # React env vars must be set at BUILD time, not runtime
        REACT_APP_API_BASE_URL: /api
        REACT_APP_ENVIRONMENT: production
    container_name: reachripple-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # NOTE: These are for reference only; React embeds env vars at build time
      REACT_APP_API_BASE_URL: /api
      REACT_APP_ENVIRONMENT: production
    volumes:
      - ../frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reachripple-network

volumes:
  mongo-data:
    name: reachripple_mongo_data
  mongo-config:
    name: reachripple_mongo_config
  redis-data:
    name: reachripple_redis_data

networks:
  reachripple-network:
    name: reachripple-network
    driver: bridge
