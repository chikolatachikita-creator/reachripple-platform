    <meta name="theme-color" content="#ec4899" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#ec4899" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Reach Ripple - Find verified escorts and companions in your local area. Real-time listings, no bots."
    />
    <meta name="keywords" content="escorts, companions, London, UK, verified profiles" />
    <meta name="author" content="Reach Ripple" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Reach Ripple" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Reach Ripple - Find Your Fantasy</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('[App] SW registered:', registration.scope);
              
              // Check for updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New content available, show update prompt
                      if (confirm('New version available! Reload to update?')) {
                        newWorker.postMessage('skipWaiting');
                        window.location.reload();
                      }
                    }
                  });
                }
              });
            })
            .catch((error) => {
              console.log('[App] SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
